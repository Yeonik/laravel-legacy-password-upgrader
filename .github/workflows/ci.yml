name: CI

on:
  push:
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        laravel: ['12.*']
        # Testbench majors track Laravel majors, so the two are pinned together:
        # picking a Laravel version alone lets Composer resolve a testbench that
        # demands a different one.
        include:
          - laravel: '12.*'
            testbench: '^10.0'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --dev --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Security advisories (composer audit)
        run: composer audit

      - name: Lint (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan level 6)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Tests (PHPUnit)
        run: vendor/bin/phpunit
